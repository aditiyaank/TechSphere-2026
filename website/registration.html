<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration | TechSphere 2026</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav>
        <h2>TechSphere 2026</h2>
    
        <a href="index.html">Home</a>
        <a href="events.html">Events</a>
        <a href="speakers.html">Speakers</a>
        <a href="registration.html">Registration</a>
        <a href="announcements.html">Announcements</a>
        <a href="contact.html">Contact</a>
    </nav>
    <section class="registration">

        <h2>Event Registration</h2>
    
        <form id="registrationForm">
    
            <label>Full Name</label><br>
            <input type="text" placeholder="Enter your full name"><br><br>
    
            <label>Email Address</label><br>
            <input type="email" placeholder="Enter your email"><br><br>
    
            <label>Department</label><br>
            <input type="text" placeholder="Enter your department"><br><br>
    
            <label>Select Event</label><br>
            <select>
                <option>AI Workshop</option>
                <option>National Hackathon</option>
                <option>Robotics Challenge</option>
            </select><br><br>
    
            <button type="submit">Register</button>
            <p id="registrationMessage"></p>
    
        </form>
    
    </section>
<script src="js/script.js"></script>
</body>

</html>
